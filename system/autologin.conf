# GDM autologin configuration for PokelearnOS kiosk
# Place at /etc/gdm3/custom.conf or /etc/gdm/custom.conf

[daemon]
AutomaticLoginEnable=True
AutomaticLogin=pokelearnos

[security]
# Disable user switching in kiosk mode
DisableUserList=True

[xdmcp]
Enable=False

[chooser]
# No remote chooser needed
