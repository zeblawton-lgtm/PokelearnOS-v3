name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - repair/**
  workflow_dispatch:

jobs:
  validate:
    name: Install, typecheck, build, shell syntax
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Run API tests
        run: pnpm --filter @workspace/api-server test

      - name: Build frontend
        run: pnpm --filter @workspace/pokelearnos build

      - name: Build backend
        run: pnpm --filter @workspace/api-server build

      - name: Check shell script syntax
        run: find scripts system iso -type f -name '*.sh' -print0 | xargs -0 -r bash -n
